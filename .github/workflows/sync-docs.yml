name: Sync Docs from Google Drive

on:
  workflow_dispatch: {}
  repository_dispatch:
    types: [drive-docs-changed]

# Opt into Node 24 for JavaScript actions (checkout, setup-node) before any step runs.
# https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm install --prefix web

      - name: Download docs from Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          DRIVE_FOLDER_CANADA:   ${{ vars.DRIVE_FOLDER_CANADA }}
          DRIVE_FOLDER_USA:      ${{ vars.DRIVE_FOLDER_USA }}
          DRIVE_FOLDER_MEXICO:   ${{ vars.DRIVE_FOLDER_MEXICO }}
          DRIVE_FOLDER_PUERTO_RICO: ${{ vars.DRIVE_FOLDER_PUERTO_RICO }}
        run: node web/scripts/download-drive-docs.js

      - name: Regenerate fixture JSON files
        run: npm run fixtures:generate --prefix web

      - name: Commit and push if anything changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add documents/ web/test/fixtures/
          if git diff --cached --quiet; then
            echo "No changes — nothing to commit."
          else
            git commit -m "chore: sync docs and fixtures from Google Drive [skip ci]"
            if ! git push; then
              echo "::error::git push failed. If the repo blocks direct pushes to the default branch, allow GitHub Actions (or github-actions[bot]) to bypass branch protection, or use a PAT with bypass in a secret."
              exit 1
            fi
          fi
